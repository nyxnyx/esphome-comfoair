esphome:
  name: comfoair
  platform: ESP8266
  board: esp01_1m

# To use locally from this repository, uncomment the 'local' source below
external_components:
  - source:
      type: git
      url: https://github.com/nyxnyx/esphome-comfoair
    components: [comfoair]
  # - source: 
  #     type: local
  #     path: components
  #   components: [comfoair]

wifi:
  ssid: 'your-wifi-ssid-here'
  password: 'put-your-wifi-password-here'

# Disable UART logging to avoid interference with the ComfoAir communication
logger:
  level: DEBUG
  baud_rate: 0

# Enable Home Assistant API
api:
  password: 'set-an-api-password-here'

ota:

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: TX
  rx_pin: RX 

comfoair:
  id: my_comfoair
  name: "ComfoAir"
  uart_id: uart_bus
  
  # Core Sensors
  fan_supply_percentage:
    name: "Fan supply (%)"
  fan_exhaust_percentage:
    name: "Fan exhaust (%)"
  fan_speed_supply:
    name: "Intake fan speed rpm"
  fan_speed_exhaust:
    name: "Exhaust fan speed rpm"
    
  # Temperature Sensors
  outside_air_temperature:
    name: "Outside air temperature"
  supply_air_temperature:
    name: "Supply air temperature"
  return_air_temperature:
    name: "Return air temperature"
  exhaust_air_temperature:
    name: "Exhaust air temperature"
  enthalpy_temperature:
    name: "Enthalpy temperature"
  ewt_temperature:
    name: "EWT temperature"
  reheating_temperature:
    name: "Reheating temperature"
  kitchen_hood_temperature:
    name: "Kitchen hood temperature"
    
  # Status & Binary Sensors
  is_bypass_valve_open:
    name: "Bypass valve open"
  is_preheating:
    name: "Preheating state"
  is_summer_mode:
    name: "Summer mode"
  is_supply_fan_active:
    name: "Supply fan active"
  is_filter_full:
    name: "Filter Change Required"
    id: comfoair_is_filter_full
    
  # Ventilation Levels (required by the card)
  return_air_level:
    name: "Return air level"
  supply_air_level:
    name: "Supply air level"
  
  # Operating Hours
  fan_hours_supply:
    name: "Supply Fan Hours"
  fan_hours_exhaust:
    name: "Exhaust Fan Hours"
  bypass_hours:
    name: "Bypass Hours"
  preheater_hours:
    name: "Preheater Hours"
  filter_hours:
    name: "Filter Hours"
  ewt_hours:
    name: "EWT Hours"
    
  # Automation Features
  auto_balance:
    name: "Auto Temperature Balance"
    
  # Diagnostics
  error_code:
    name: "Last Error Code"

text_sensor:
  - platform: template
    name: "Filter Status"
    lambda: |-
      if (id(comfoair_is_filter_full).state) {
        return {"Full"};
      } else {
        return {"Ok"};
      }
    update_interval: 60s

# Example button to reset the filter timer after maintenance
button:
  - platform: template
    name: "Reset Filter Timer"
    icon: "mdi:filter-remove"
    on_press:
      then:
        - lambda: |-
            id(my_comfoair)->reset_filter();
