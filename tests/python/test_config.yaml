esphome:
  name: test_comfoair
  platform: ESP8266
  board: esp01_1m

external_components:
  - source: 
      type: local
      path: ../../components
    components: [comfoair]

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: TX
  rx_pin: RX

comfoair:
  name: "ComfoAir 350 Test"
  id: my_comfoair
  uart_id: uart_bus
  
  # Cover all sensor types
  fan_speed_supply:
    name: "Fan Speed"
  outside_air_temperature:
    name: "Outside Temp"
  fan_supply_percentage:
    name: "Fan Power"
  is_bypass_valve_open:
    name: "Bypass Open"
  fan_hours_supply:
    name: "Fan Hours"
  return_air_level:
    name: "Return Level"
  error_code:
    name: "Error Code"
    
  # Automation
  auto_balance:
    name: "Auto Balance"

# Template components that interact with the main component
binary_sensor:
  - platform: template
    name: "Is bypas open"
    lambda: |-
      return true;

text_sensor:
  - platform: template
    name: "Filter Status"
    lambda: |-
      return {"Ok"};

button:
  - platform: template
    name: "Reset Filter"
    on_press:
      then:
        - lambda: |-
            id(my_comfoair)->reset_filter();
